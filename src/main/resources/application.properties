spring.application.name=nexcare-backend

# Frontend URL for email links (override via env APP_FRONTEND_URL)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Mailjet SMTP (credentials via env vars MAILJET_API_KEY / MAILJET_SECRET_KEY)
spring.mail.host=in-v3.mailjet.com
spring.mail.port=587
spring.mail.username=${MAILJET_API_KEY:noreply@example.com}
spring.mail.password=${MAILJET_SECRET_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Change the server port to 8081
server.port=8081
# Enable pretty JSON output
spring.jackson.serialization.indent-output=true
# only update DB schema (keep existing data)
spring.jpa.hibernate.ddl-auto=update

# Database configuration (H2, file-based)
spring.datasource.url=jdbc:h2:file:./target/nexcare-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Auth0 configuration (set via env variables OKTA_OAUTH2_ISSUER and OKTA_OAUTH2_AUDIENCE)
okta.oauth2.issuer=${OKTA_OAUTH2_ISSUER:https://dev-m7r3to5keud2gw65.us.auth0.com/}
okta.oauth2.audience=${OKTA_OAUTH2_AUDIENCE:https://nexcare.api}

# For MariaDB use the `test` or `prod` Spring profile:
#   SPRING_DATASOURCE_PASSWORD=<pwd> mvn spring-boot:run -Dspring-boot.run.profiles=test
#   SPRING_DATASOURCE_PASSWORD=<pwd> mvn spring-boot:run -Dspring-boot.run.profiles=prod
# See application-test.properties and application-prod.properties.
